server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/javascript image/png image/jpeg;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|mp4)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}